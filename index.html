<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق بلس - متجر آمن</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // مكون بسيط لمحاكاة الأيقونات لأن مكتبة Lucide تحتاج إعداد خاص
        const Icon = ({ name }) => <span className="font-bold">[{name}]</span>;

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');

            const products = [
                { id: 1, name: 'ساعة ذكية', price: 15000, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200' },
                { id: 2, name: 'سماعات عازلة', price: 22000, image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200' }
            ];

            const addToCart = (p) => setCart([...cart, p]);

            return (
                <div>
                    <header className="bg-white p-4 shadow-md flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-blue-600">سوق بلس</h1>
                        <div className="bg-gray-100 p-2 rounded-full px-4">السلة: {cart.length}</div>
                    </header>
                    
                    <main className="p-8">
                        <div className="bg-blue-600 text-white p-8 rounded-2xl mb-8 text-center">
                            <h2 className="text-3xl font-bold">اكتشف أحدث العروض</h2>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {products.map(p => (
                                <div key={p.id} className="bg-white p-4 rounded-xl shadow-sm border">
                                    <img src={p.image} className="w-full h-40 object-cover rounded-md mb-4" />
                                    <h3 className="font-bold">{p.name}</h3>
                                    <div className="flex justify-between items-center mt-4">
                                        <span className="text-blue-600 font-bold">{p.price} د.ج</span>
                                        <button onClick={() => addToCart(p)} className="bg-blue-600 text-white px-4 py-2 rounded-lg">إضافة</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
