<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WahRAN | Mohamed Yacine Boucheteur</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function WahranStore() {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [orderSent, setOrderSent] = useState(false);
            const [user, setUser] = useState({ name: '', phone: '', address: '' });

            function WahranStore() {
            const [cart, setCart] = useState([]);
            // ... (باقي الحالات كما هي)

            const products = [
                { id: 1, name: 'ساعة ذكية برو', price: 15000, oldPrice: 19000, img: 'watch.jpg' },
                { id: 2, name: 'سماعات لاسلكية', price: 22000, oldPrice: 28000, img: 'headphones.png' },
                { id: 3, name: 'حقيبة سفر فاخرة', price: 12000, oldPrice: 15500, img: 'bag.jpg' }
            ];

            // قسم آراء الزبائن
            const reviews = [
                { id: 1, name: "أحمد من وهران", text: "جودة ممتازة وتوصيل سريع جداً، بارك الله فيكم.", stars: 5 },
                { id: 2, name: "سارة من سيدي بلعباس", text: "المنتج مطابق تماماً للصور، تعامل راقي.", stars: 5 }
            ];

            return (
                <div className="min-h-screen">
                    {/* ... (Header و Hero كما هما) ... */}

                    {/* قائمة المنتجات مع السعر المشطوب */}
                    <main className="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {products.map(p => (
                            <div key={p.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl transition relative">
                                {p.oldPrice && <span className="absolute top-4 right-4 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold z-10">تخفيض!</span>}
                                <img src={p.img} className="w-full h-56 object-cover" />
                                <div className="p-6">
                                    <h3 className="text-xl font-bold mb-2">{p.name}</h3>
                                    <div className="flex flex-col mb-4">
                                        {p.oldPrice && <span className="text-sm text-slate-400 line-through">{p.oldPrice.toLocaleString()} د.ج</span>}
                                        <span className="text-2xl font-black text-blue-600">{p.price.toLocaleString()} د.ج</span>
                                    </div>
                                    <button onClick={() => addToCart(p)} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">إضافة للسلة</button>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* قسم آراء الزبائن الجديد */}
                    <section className="bg-slate-100 py-16 px-6">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-3xl font-bold mb-10 text-slate-800">ماذا يقول زبائننا؟</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {reviews.map(r => (
                                    <div key={r.id} className="bg-white p-6 rounded-2xl shadow-sm text-right">
                                        <div className="text-yellow-400 mb-2">{"⭐".repeat(r.stars)}</div>
                                        <p className="text-slate-600 italic mb-4">"{r.text}"</p>
                                        <p className="font-bold text-blue-600">— {r.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ... (Footer والـ Sidebar) ... */}
                </div>
            );
        }
            ];

            const addToCart = (p) => {
                setCart([...cart, { ...p, itemId: Date.now() }]);
                setIsCartOpen(true);
            };

            const sendToWhatsapp = (e) => {
                e.preventDefault();
                const productList = cart.map(i => `• *${i.name}*`).join('\n');
                const total = cart.reduce((a, b) => a + b.price, 0);
                
                const msg = `السلام عليكم متجر *WahRAN* 🛒\n\n` +
                            `طلب جديد من: *${user.name}*\n` +
                            `الهاتف: ${user.phone}\n` +
                            `العنوان: ${user.address}\n\n` +
                            `*المنتجات:*\n${productList}\n\n` +
                            `*المجموع الإجمالي:* ${total.toLocaleString()} د.ج\n\n` +
                            `شكراً لكم، في انتظار تأكيد الطلب.`;

                window.open(`https://wa.me/213658900112?text=${encodeURIComponent(msg)}`, '_blank');
                setOrderSent(true);
                setCart([]);
                setIsCartOpen(false);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white shadow-md p-4 sticky top-0 z-40 flex justify-between items-center">
                        <h1 className="text-3xl font-black text-blue-700 tracking-tighter">WahRAN</h1>
                        <button onClick={() => setIsCartOpen(true)} className="bg-slate-100 p-3 rounded-full relative">
                            🛒 {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{cart.length}</span>}
                        </button>
                    </header>

                    {/* Hero */}
                    <section className="bg-blue-600 text-white py-16 px-4 text-center">
                        <h2 className="text-4xl font-extrabold mb-2 text-white">متجر WahRAN الرسمي</h2>
                        <p className="opacity-90">تسوق بكل ثقة مع محمد ياسين </p>
                    </section>

                    {/* Products */}
                    <main className="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {products.map(p => (
                            <div key={p.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl transition">
                                <img src={p.img} className="w-full h-56 object-cover" />
                                <div className="p-6">
                                    <h3 className="text-xl font-bold mb-4">{p.name}</h3>
                                    <div className="flex justify-between items-center">
                                        <span className="text-2xl font-black text-blue-600">{p.price.toLocaleString()} د.ج</span>
                                        <button onClick={() => addToCart(p)} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">إضافة</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Cart Sidebar */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full p-8 overflow-y-auto">
                                <h2 className="text-2xl font-black mb-6 border-b pb-4 text-blue-800">سلة WahRAN</h2>
                                {cart.length === 0 ? <p className="text-center py-20 text-slate-400">السلة فارغة حالياً</p> : (
                                    <form onSubmit={sendToWhatsapp} className="space-y-4">
                                        <div className="space-y-2 mb-6">
                                            {cart.map(item => (
                                                <div key={item.itemId} className="flex justify-between p-3 bg-slate-50 rounded-xl">
                                                    <span>{item.name}</span>
                                                    <span className="font-bold">{item.price.toLocaleString()} د.ج</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="text-2xl font-black text-blue-700 py-4">الإجمالي: {cart.reduce((a,b)=>a+b.price, 0).toLocaleString()} د.ج</div>
                                        <input required placeholder="الاسم الكامل" className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onChange={e=>setUser({...user, name: e.target.value})} />
                                        <input required type="tel" placeholder="رقم الهاتف" className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onChange={e=>setUser({...user, phone: e.target.value})} />
                                        <textarea required placeholder="العنوان بالتفصيل" className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 h-24" onChange={e=>setUser({...user, address: e.target.value})}></textarea>
                                        <button className="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg shadow-green-200">تأكيد الطلب (WhatsApp)</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-20 py-10 bg-slate-900 text-slate-400 text-center">
                        <p className="text-lg font-bold text-white mb-2">WahRAN Store</p>
                        <p>© 2026 جميع الحقوق محفوظة</p>
                        <p className="mt-4 text-xs font-mono tracking-widest text-blue-500">DEVELOPED BY: MOHAMED YACINE BOUCHETEUR</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WahranStore />);
    </script>
</body>
</html>
