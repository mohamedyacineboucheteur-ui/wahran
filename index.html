<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق بلس | متجر إلكتروني آمن</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function StoreApp() {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [orderComplete, setOrderComplete] = useState(false);
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });

            const products = [
                { id: 1, name: 'ساعة ذكية برو', price: 15000, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400' },
                { id: 2, name: 'سماعات لاسلكية', price: 22000, image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400' },
                { id: 3, name: 'حقيبة سفر جلدية', price: 12000, image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400' }
            ];

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);

            // --- الدالة المحدثة للتحويل إلى واتساب ---
            const handleOrder = (e) => {
                e.preventDefault();

                // 1. تنظيف البيانات (Security)
                const cleanName = formData.name.replace(/[<>]/g, "");
                const cleanPhone = formData.phone.replace(/[<>]/g, "");
                const cleanAddress = formData.address.replace(/[<>]/g, "");

                // 2. تجهيز نص الرسالة
                const productList = cart.map(item => `- ${item.name} (${item.price} د.ج)`).join('\n');
                const message = `*طلب جديد من المتجر* 🛒\n\n` +
                                `*الاسم:* ${cleanName}\n` +
                                `*الهاتف:* ${cleanPhone}\n` +
                                `*العنوان:* ${cleanAddress}\n\n` +
                                `*المنتجات:*\n${productList}\n\n` +
                                `*المجموع:* ${totalPrice.toLocaleString()} د.ج`;

                // 3. الرقم الخاص بك
                const myPhoneNumber = "213658900112"; 

                // 4. فتح رابط واتساب
                const whatsappUrl = `https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');

                setOrderComplete(true);
                setCart([]);
                setIsCartOpen(false);
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white shadow-sm sticky top-0 z-30 p-4 flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-blue-700">سوق بلس</h1>
                        <button onClick={() => setIsCartOpen(true)} className="relative p-2 bg-slate-100 rounded-full">
                            🛒 <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{cart.length}</span>
                        </button>
                    </header>

                    <section className="bg-blue-600 text-white py-12 px-4 text-center">
                        <h2 className="text-3xl font-bold">تسوق بضمان وأمان</h2>
                        <p className="mt-2 opacity-90 text-sm">اطلب الآن والدفع عند الاستلام</p>
                    </section>

                    <main className="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        {products.map(p => (
                            <div key={p.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-200">
                                <img src={p.image} className="w-full h-48 object-cover" />
                                <div className="p-4">
                                    <h3 className="text-lg font-bold">{p.name}</h3>
                                    <div className="flex justify-between items-center mt-4">
                                        <span className="text-xl font-bold text-blue-600">{p.price.toLocaleString()} د.ج</span>
                                        <button onClick={() => addToCart(p)} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">إضافة</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Cart Sidebar */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl p-6 flex flex-col overflow-y-auto">
                                <h2 className="text-2xl font-bold mb-4 border-b pb-2">سلتك</h2>
                                {cart.length === 0 ? <p className="text-gray-400">السلة فارغة</p> : (
                                    <>
                                        <div className="flex-1 space-y-4">
                                            {cart.map(item => (
                                                <div key={item.cartId} className="flex justify-between bg-slate-50 p-2 rounded">
                                                    <span>{item.name}</span>
                                                    <button onClick={() => removeFromCart(item.cartId)} className="text-red-500 text-xs italic underline">حذف</button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-6 border-t pt-4">
                                            <p className="text-xl font-bold mb-4 text-left italic">المجموع: {totalPrice.toLocaleString()} د.ج</p>
                                            <form onSubmit={handleOrder} className="space-y-3">
                                                <input required type="text" placeholder="الاسم" className="w-full p-2 border rounded" onChange={e => setFormData({...formData, name: e.target.value})} />
                                                <input required type="tel" placeholder="الهاتف" className="w-full p-2 border rounded" onChange={e => setFormData({...formData, phone: e.target.value})} />
                                                <textarea required placeholder="العنوان" className="w-full p-2 border rounded" onChange={e => setFormData({...formData, address: e.target.value})}></textarea>
                                                <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg">إتمام الطلب عبر WhatsApp</button>
                                            </form>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {orderComplete && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/70" onClick={() => setOrderComplete(false)}></div>
                            <div className="relative bg-white p-8 rounded-2xl text-center">
                                <h2 className="text-xl font-bold">تم تحويلك للواتساب! ✅</h2>
                                <p className="text-gray-500 mt-2">يرجى الضغط على "إرسال" في التطبيق.</p>
                                <button onClick={() => setOrderComplete(false)} className="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">إغلاق</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StoreApp />);
    </script>
</body>
</html>
